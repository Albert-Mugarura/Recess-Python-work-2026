<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Commerce System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 400px; }
        h1 { text-align: center; color: #1a1a2e; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border-color 0.3s; }
        input[type="text"]:focus, input[type="password"]:focus, select:focus { outline: none; border-color: #0f3460; }
        .btn { width: 100%; padding: 12px; background: #0f3460; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1a1a2e; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #0f3460; text-decoration: none; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
        .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .flash.error { background: #ffe0e0; color: #c0392b; border: 1px solid #f5c6cb; }
        .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Register for the E-Commerce System</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label for="role">Account Type</label>
                <select id="role" name="role">
                    <option value="Customer">Customer</option>
                    <option value="Cashier">Cashier</option>
                </select>
            </div>
            <button type="submit" class="btn">Register</button>
        </form>

        <div class="links">
            <a href="{{ url_for('login') }}">Already have an account? Sign in</a>
        </div>
    </div>
</body>
</html>
