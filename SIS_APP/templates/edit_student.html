{% extends "base.html" %}

{% block title %}Edit Student - Student Information System{% endblock %}

{% block content %}
    <section class="register-page">
        <h2>Edit Student Information</h2>
        <div class="form-container">
            <form method="POST" action="{{ url_for('edit_student', student_id=student.id) }}" class="registration-form">
                <div class="form-group">
                    <label for="student_name">Student Name *</label>
                    <input type="text" id="student_name" name="student_name" 
                           value="{{ student.student_name }}" required>
                </div>

                <div class="form-group">
                    <label for="registration_number">Registration Number *</label>
                    <input type="text" id="registration_number" name="registration_number" 
                           value="{{ student.registration_number }}" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" 
                           value="{{ student.email }}" required>
                </div>

                <div class="form-group">
                    <label for="programme">Programme of Study *</label>
                    <select id="programme" name="programme" required>
                        <option value="">Select your programme</option>
                        <option value="Computer Science" {{ 'selected' if student.programme == 'Computer Science' }}>Computer Science</option>
                        <option value="Information Technology" {{ 'selected' if student.programme == 'Information Technology' }}>Information Technology</option>
                        <option value="Software Engineering" {{ 'selected' if student.programme == 'Software Engineering' }}>Software Engineering</option>
                        <option value="Data Science" {{ 'selected' if student.programme == 'Data Science' }}>Data Science</option>
                        <option value="Machine Learning" {{ 'selected' if student.programme == 'Machine learning' or student.programme == 'Machine Learning' }}>Machine Learning</option>
                    </select>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Update Student</button>
                    <a href="{{ url_for('students_list') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
